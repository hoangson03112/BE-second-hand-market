version: "2"
type: backend
tech_stack:
  - JavaScript (Node.js)
  - Express
  - MongoDB (Mongoose)
  - Redis (Upstash REST or traditional Redis)
  - Socket.IO
features:
  - name: Authentication and Account Management API
    description: Handles registration, login, token refresh, password reset, and account profile operations
    files:
      - src/modules/auth/auth.routes.js
      - src/modules/auth/auth.controller.js
      - src/middlewares/verifyToken.js
    endpoints:
      - method: POST
        path: /eco-market/auth/register
        description: Register a new account
        auth_required: false
        response_schema:
          "200": Account with verification state
          "400": Validation or business error
      - method: POST
        path: /eco-market/auth/login
        description: Login with email and password
        auth_required: false
        response_schema:
          "200": Access and refresh tokens
          "401": Invalid credentials
      - method: POST
        path: /eco-market/auth/refresh
        description: Refresh access token using refresh token
        auth_required: false
        response_schema:
          "200": New access token
          "401": Invalid refresh token
      - method: PUT
        path: /eco-market/auth/update
        description: Update account profile
        auth_required: true
        response_schema:
          "200": Updated account profile
          "401": Unauthorized
    depends_on:
      - JWT middleware
      - MongoDB
  - name: Product Catalog and Listing API
    description: Provides public catalog browsing plus seller/admin product management
    files:
      - src/modules/product/product.routes.js
      - src/modules/product/product.controller.js
    endpoints:
      - method: GET
        path: /eco-market/products/featured
        description: Get featured products for homepage
        auth_required: false
        response_schema:
          "200": Product[]
      - method: GET
        path: /eco-market/products/search
        description: Search products by query and filters
        auth_required: false
        response_schema:
          "200": Product[]
      - method: POST
        path: /eco-market/products
        description: Create a new product listing
        auth_required: true
        request_schema:
          body:
            name: string
            price: number
            categoryId: string
        response_schema:
          "200": Created product
          "400": Validation error
      - method: PATCH
        path: /eco-market/products/:productId/status
        description: Approve/reject product status (admin)
        auth_required: true
        response_schema:
          "200": Updated product moderation status
          "403": Forbidden
    depends_on:
      - Auth middleware
      - File upload middleware
      - MongoDB
  - name: Order and Checkout API
    description: Manages buyer orders, seller order updates, tracking, payout triggers, and refund actions
    files:
      - src/modules/order/order.routes.js
      - src/modules/order/order.controller.js
      - src/services/payment.service.js
      - src/services/payout.service.js
    endpoints:
      - method: POST
        path: /eco-market/orders
        description: Create order from checkout flow
        auth_required: true
        response_schema:
          "200": Created order
          "400": Business rule error
      - method: GET
        path: /eco-market/orders/my-orders
        description: List current buyer orders
        auth_required: true
        response_schema:
          "200": Order[]
      - method: PATCH
        path: /eco-market/orders/:id/confirm-received
        description: Buyer confirms order received
        auth_required: true
        response_schema:
          "200": Updated order
      - method: GET
        path: /eco-market/orders/admin/all
        description: List all orders for admin panel
        auth_required: true
        response_schema:
          "200": Paginated order list
          "403": Forbidden
    depends_on:
      - JWT middleware
      - Payment service
      - MongoDB
  - name: Cart API
    description: Supports cart item CRUD and quantity updates
    files:
      - src/modules/cart/cart.routes.js
      - src/modules/cart/cart.controller.js
    endpoints:
      - method: GET
        path: /eco-market/cart
        description: Get current user's cart
        auth_required: true
        response_schema:
          "200": Cart object
      - method: POST
        path: /eco-market/cart
        description: Add item to cart
        auth_required: true
        request_schema:
          body:
            productId: string
            quantity: number
        response_schema:
          "200": Updated cart
      - method: PUT
        path: /eco-market/cart/:id
        description: Update cart item quantity
        auth_required: true
        response_schema:
          "200": Updated cart item
    depends_on:
      - JWT middleware
      - MongoDB
  - name: Chat and AI-Assisted Search API
    description: Real-time conversation APIs and AI-powered product search interactions
    files:
      - src/modules/chat/chat.routes.js
      - src/modules/chat/chat.controller.js
      - src/services/socket.js
    endpoints:
      - method: GET
        path: /eco-market/chat/conversations
        description: Get conversation list
        auth_required: true
        response_schema:
          "200": Conversation[]
      - method: POST
        path: /eco-market/chat/ai/search-products
        description: Search products using AI assistant
        auth_required: true
        response_schema:
          "200": AI-ranked products
      - method: POST
        path: /eco-market/chat/optimized/send
        description: Send optimized chat message
        auth_required: true
        response_schema:
          "200": Sent message payload
    depends_on:
      - JWT middleware
      - Socket.IO
      - AI integration services
  - name: Seller Onboarding and Administration API
    description: Handles seller registration, approval workflow, and admin-level seller management
    files:
      - src/modules/seller/seller.routes.js
      - src/modules/seller/seller.controller.js
      - src/modules/admin/admin.routes.js
    endpoints:
      - method: POST
        path: /eco-market/sellers/register
        description: Submit seller registration request
        auth_required: true
        response_schema:
          "200": Submitted seller request
      - method: GET
        path: /eco-market/sellers/request-status
        description: Get current seller request status
        auth_required: true
        response_schema:
          "200": Seller status payload
      - method: GET
        path: /eco-market/sellers/admin/all
        description: Get all sellers for admin review
        auth_required: true
        response_schema:
          "200": Seller[]
          "403": Forbidden
    depends_on:
      - JWT middleware
      - Admin authorization middleware
      - MongoDB
known_limitations:
  - issue: Backend startup fails due undefined route callback in chat routes
    location: src/modules/chat/chat.routes.js
    impact: API server cannot boot, blocking end-to-end execution tests
